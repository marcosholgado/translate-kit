plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'maven-publish'
}

def versionProps = new Properties()
file("${rootDir}/version.properties").withInputStream { versionProps.load(it) }

ext {
    GROUP_ID = 'io.github.marcosholgado'
    ARTIFACT_ID = 'translate-kit-android'
    VERSION_NAME = versionProps.getProperty('VERSION_NAME')
}

android {
    namespace 'io.github.marcosholgado.translatekit'
    compileSdk 35
    ndkVersion '28.2.13676358'

    defaultConfig {
        // minSdk 28 is the floor: the Bergamot engine (marian/pathie-cpp) uses
        // glob()/iconv(), which Android bionic only provides at API 28+.
        minSdk 28

        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'

        externalNativeBuild {
            cmake {
                // Build only our JNI library (not the bergamot CLI/tests).
                targets 'translate-kit'
                arguments '-DCMAKE_BUILD_TYPE=Release', '-DTRANSLATEKIT_WITH_ENGINE=ON'
            }
        }

        ndk {
            // arm64-v8a: real phones (ruy/NEON). x86_64: emulator/CI (intgemm).
            // armeabi-v7a deferred (32-bit NMT is memory-tight).
            //
            // CI narrows this to a single ABI via -PtestAbi=<abi> so the emulator
            // job builds only the engine it will actually run (skipping the other
            // ABI's ~10-min compile). The published AAR always ships both.
            def testAbi = project.findProperty('testAbi')
            if (testAbi) {
                abiFilters testAbi.toString()
            } else {
                abiFilters 'arm64-v8a', 'x86_64'
            }
        }
    }

    externalNativeBuild {
        cmake {
            path 'CMakeLists.txt'
            version '3.22.1'
        }
    }

    // Test-model fixtures live at the repo root (shared across platform
    // wrappers). They are scoped to the `debug` source set, NOT `main`, so the
    // published release AAR ships no model assets — production needs none: CLD2
    // is compiled into the .so, and NMT models are downloaded at runtime by the
    // caller and passed in as on-disk paths. Instrumented tests run against the
    // debug variant (testBuildType defaults to 'debug'), so they still resolve
    // the model through the app-under-test context.
    sourceSets {
        debug {
            assets.srcDirs += ['../../models']
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    testOptions {
        // JVM unit tests exercise the graceful-degradation path (no native lib on
        // the host); let the stubbed android.util.Log no-op instead of throwing.
        unitTests.returnDefaultValues = true
    }

    kotlin {
        jvmToolchain(21)
        compilerOptions {
            jvmTarget.set(org.jetbrains.kotlin.gradle.dsl.JvmTarget.JVM_17)
        }
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

dependencies {
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.12.0'

    // Instrumented tests: exercise the real JNI + .so engine path on a device.
    androidTestImplementation 'androidx.test.ext:junit:1.2.1'
    androidTestImplementation 'androidx.test:runner:1.6.2'
    androidTestImplementation 'androidx.test:core:1.6.1'
}

afterEvaluate {
    publishing {
        publications {
            release(MavenPublication) {
                from components.release
                groupId = GROUP_ID
                artifactId = ARTIFACT_ID
                version = VERSION_NAME

                pom {
                    name = 'translate-kit'
                    description = 'On-device neural machine translation + offline language detection.'
                    url = 'https://github.com/marcosholgado/translate-kit'
                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'http://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }
                }
            }
        }
        repositories {
            maven {
                name = 'GitHubPackages'
                url = 'https://maven.pkg.github.com/marcosholgado/translate-kit'
                credentials {
                    username = System.getenv('GITHUB_ACTOR') ?: (project.findProperty('gpr.user') ?: '')
                    password = System.getenv('GITHUB_TOKEN') ?: (project.findProperty('gpr.key') ?: '')
                }
            }
        }
    }
}
