# Continuous integration across each platform's real toolchain:
#   - core-native:      x86_64 Linux — builds + runs the host gtest goldens natively (fast).
#   - android-emulator: x86_64 Linux — instrumented tests on a KVM-accelerated x86_64 Android
#                       emulator (the real .so + JNI path). The x86_64 engine path can only be
#                       *run* on an x86_64 host (the emulator refuses x86_64 guests on an
#                       aarch64 host, e.g. Apple Silicon), hence the Linux runners here.
#   - apple:            macOS (Apple Silicon) — builds the macOS + iOS-simulator slices and runs
#                       the Swift goldens on both (`swift test` + an iOS-sim `xcodebuild test`).
# Android arm64 is validated locally on an arm64 device/emulator (see C.5).

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-native:
    name: core gtest (x86_64 native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Init engine submodules
        run: |
          git submodule update --init --recursive third_party/cld2
          git submodule update --init third_party/translations
          # The README's set is ARM-only; x86_64 also needs intgemm.
          git -C third_party/translations submodule update --init --recursive \
            inference/3rd_party/ssplit-cpp \
            inference/marian-fork/src/3rd_party/sentencepiece \
            inference/marian-fork/src/3rd_party/intgemm \
            inference/marian-fork/src/3rd_party/ruy \
            inference/marian-fork/src/3rd_party/simd_utils

      - name: Apply engine patches
        run: bash scripts/apply-engine-patches.sh

      - name: Fetch test model
        run: bash scripts/fetch-models.sh

      - name: Install ninja
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Configure
        run: >
          cmake -S core -B core/build-ci -G Ninja
          -DTRANSLATEKIT_BUILD_TESTS=ON
          -DTRANSLATEKIT_WITH_ENGINE=ON
          -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build core/build-ci -j

      - name: Test (with real tiny en->de model)
        run: |
          TK_TEST_MODEL_DIR="$PWD/models/test-models/ende.student.tiny11" \
            ./core/build-ci/test/translatekit_core_test

  android-emulator:
    name: instrumented (x86_64 emulator)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Init engine submodules
        run: |
          git submodule update --init --recursive third_party/cld2
          git submodule update --init third_party/translations
          git -C third_party/translations submodule update --init --recursive \
            inference/3rd_party/ssplit-cpp \
            inference/marian-fork/src/3rd_party/sentencepiece \
            inference/marian-fork/src/3rd_party/intgemm \
            inference/marian-fork/src/3rd_party/ruy \
            inference/marian-fork/src/3rd_party/simd_utils

      - name: Apply engine patches
        run: bash scripts/apply-engine-patches.sh

      - name: Fetch test model
        run: bash scripts/fetch-models.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install NDK + CMake
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.2.13676358" "cmake;3.22.1"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Unit tests (JVM)
        run: cd android && ./gradlew :translate-kit:testDebugUnitTest

      - name: Instrumented tests on x86_64 emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          target: google_apis
          # Build only the x86_64 engine (the emulator's ABI); the published AAR
          # still ships both ABIs.
          script: cd android && ./gradlew :translate-kit:connectedAndroidTest -PtestAbi=x86_64

  apple:
    name: apple (macOS + iOS sim)
    runs-on: macos-latest      # GitHub's macOS runners are Apple Silicon (arm64)
    steps:
      - uses: actions/checkout@v4

      - name: Init engine submodules
        run: |
          git submodule update --init --recursive third_party/cld2
          git submodule update --init third_party/translations
          git -C third_party/translations submodule update --init --recursive \
            inference/3rd_party/ssplit-cpp \
            inference/marian-fork/src/3rd_party/sentencepiece \
            inference/marian-fork/src/3rd_party/intgemm \
            inference/marian-fork/src/3rd_party/ruy \
            inference/marian-fork/src/3rd_party/simd_utils

      - name: Apply engine patches
        run: bash scripts/apply-engine-patches.sh

      - name: Fetch test model
        run: bash scripts/fetch-models.sh

      - name: Install Ninja
        run: brew install ninja

      # Build only the slices CI can functionally exercise on an Apple-Silicon
      # runner: macos-arm64 (for `swift test`) and iossim-arm64 (for the iOS-sim
      # `xcodebuild test`). The full, shippable XCFramework (universal macOS +
      # Intel, iOS device, universal simulator) is built by the release workflow;
      # the slices omitted here are cross-compiled and link-only, so they can't be
      # run on this runner. build-apple.sh defaults CMAKE_BIN/NINJA_BIN to the
      # Android SDK (absent here), so point them at the Homebrew toolchain.
      - name: Build Apple slices (macOS + iOS simulator, arm64)
        run: |
          export CMAKE_BIN="$(command -v cmake)"
          export NINJA_BIN="$(command -v ninja)"
          scripts/build-apple.sh macos-arm64 iossim-arm64

      # The root Package.swift defaults to the remote release XCFramework; set
      # TRANSLATEKIT_LOCAL_XCFRAMEWORK=1 so it resolves the slice we just built.
      - name: Swift goldens (macOS host)
        run: |
          TRANSLATEKIT_LOCAL_XCFRAMEWORK=1 \
          TK_TEST_MODEL_DIR="$PWD/models/test-models/ende.student.tiny11" \
            swift test

      - name: Swift goldens (iOS simulator)
        run: |
          set -euo pipefail
          # Pick the first available iPhone simulator on the runner image.
          SIM_ID="$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name | startswith("iPhone"))][0].udid')"
          echo "Using iOS simulator $SIM_ID"
          xcrun simctl bootstatus "$SIM_ID" -b
          # SIMCTL_CHILD_* doesn't reach the test under xcodebuild, so inject the
          # model dir into the booted sim's environment via launchctl.
          xcrun simctl spawn "$SIM_ID" launchctl setenv TK_TEST_MODEL_DIR \
            "$PWD/models/test-models/ende.student.tiny11"
          TRANSLATEKIT_LOCAL_XCFRAMEWORK=1 xcrun xcodebuild test -scheme TranslateKit \
            -destination "platform=iOS Simulator,id=$SIM_ID"
