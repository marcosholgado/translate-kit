# Publishes the AAR to GitHub Packages on a version tag.
#
# Tag a CI-green commit on main as v<version> (e.g. v0.1.0) and push it; this
# workflow builds the release AAR for BOTH shipped ABIs (arm64-v8a + x86_64) and
# publishes it to GitHub Packages as
# io.github.marcosholgado:translate-kit-android:<version>.
#
# The artifact version comes from android/version.properties (VERSION_NAME); the
# tag must match it (the guard below fails fast otherwise). The release build
# bundles no model assets — they are debug/test-only (see the android module's
# source-set mapping) — so this job intentionally does NOT fetch the test model.

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish AAR to GitHub Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches version.properties
        if: github.ref_type == 'tag'
        run: |
          version="$(sed -n 's/^VERSION_NAME=//p' android/version.properties)"
          tag="${GITHUB_REF_NAME#v}"
          echo "version.properties=$version  tag=$tag"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag '$GITHUB_REF_NAME' does not match VERSION_NAME '$version' in android/version.properties"
            exit 1
          fi

      - name: Init engine submodules
        run: |
          git submodule update --init --recursive third_party/cld2
          git submodule update --init third_party/translations
          git -C third_party/translations submodule update --init --recursive \
            inference/3rd_party/ssplit-cpp \
            inference/marian-fork/src/3rd_party/sentencepiece \
            inference/marian-fork/src/3rd_party/intgemm \
            inference/marian-fork/src/3rd_party/ruy \
            inference/marian-fork/src/3rd_party/simd_utils

      - name: Apply engine patches
        run: bash scripts/apply-engine-patches.sh

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install NDK + CMake
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.2.13676358" "cmake;3.22.1"

      # Builds the engine for both shipped ABIs (no -PtestAbi), then publishes.
      # ~20+ min cold (two native engine builds); acceptable for a tag release.
      - name: Publish to GitHub Packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd android && ./gradlew :translate-kit:publish --no-daemon
